# Tauri release build workflow.
#
# Triggered: push a tag that matches `v*` (e.g. `git tag v2.0.1 && git push
# origin v2.0.1`). Builds the desktop app for macOS (arm64 + x64), Windows
# (x64), and Linux (x64), and uploads the artefacts to the matching GitHub
# Release.
#
# The Landing's DownloadSection points at the latest release's assets, so
# cutting a tag is the full publish flow: commit → tag → push → release
# appears at github.com/<owner>/kerdos/releases/latest.

name: Release desktop builds

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable (with targets for macOS)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install JS dependencies
        run: npm ci

      - name: Build + upload via tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Kerdos ${{ github.ref_name }}'
          releaseBody: |
            Desktop builds for Kerdos ${{ github.ref_name }}.

            - macOS (Apple Silicon): Kerdos_${{ github.ref_name }}_aarch64.dmg
            - macOS (Intel): Kerdos_${{ github.ref_name }}_x64.dmg
            - Windows: Kerdos_${{ github.ref_name }}_x64_en-US.msi
            - Linux: kerdos_${{ github.ref_name }}_amd64.AppImage

            Builds are currently unsigned. macOS users: right-click the
            app after extracting and choose "Open" to bypass Gatekeeper
            on first launch.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
